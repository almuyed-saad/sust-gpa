openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: gpa
    description: GPA Calculator - semesters and courses management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Log out a mobile session
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logged out successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutMobileSessionSuccess'

  /semesters:
    get:
      tags: [gpa]
      operationId: getSemesters
      summary: Get all semesters for the authenticated user
      responses:
        '200':
          description: List of semesters with courses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SemesterListResponse'
        '401':
          description: Unauthorized
    post:
      tags: [gpa]
      operationId: createSemester
      summary: Create a new semester
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSemesterBody'
      responses:
        '201':
          description: Semester created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SemesterResponse'
        '401':
          description: Unauthorized

  /semesters/{semesterId}:
    put:
      tags: [gpa]
      operationId: updateSemester
      summary: Update a semester name
      parameters:
        - name: semesterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSemesterBody'
      responses:
        '200':
          description: Semester updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SemesterResponse'
        '401':
          description: Unauthorized
    delete:
      tags: [gpa]
      operationId: deleteSemester
      summary: Delete a semester and all its courses
      parameters:
        - name: semesterId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Semester deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          description: Unauthorized

  /semesters/{semesterId}/courses:
    post:
      tags: [gpa]
      operationId: createCourse
      summary: Add a course to a semester
      parameters:
        - name: semesterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseBody'
      responses:
        '201':
          description: Course created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '401':
          description: Unauthorized

  /semesters/{semesterId}/courses/{courseId}:
    put:
      tags: [gpa]
      operationId: updateCourse
      summary: Update a course
      parameters:
        - name: semesterId
          in: path
          required: true
          schema:
            type: string
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCourseBody'
      responses:
        '200':
          description: Course updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseResponse'
        '401':
          description: Unauthorized
    delete:
      tags: [gpa]
      operationId: deleteCourse
      summary: Delete a course
      parameters:
        - name: semesterId
          in: path
          required: true
          schema:
            type: string
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Course deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          description: Unauthorized

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
      required:
        - id

    AuthUserEnvelope:
      type: object
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
      required:
        - user

    MobileTokenExchangeRequest:
      type: object
      properties:
        code:
          type: string
        code_verifier:
          type: string
        redirect_uri:
          type: string
        state:
          type: string
        nonce:
          type: string
          nullable: true
      required:
        - code
        - code_verifier
        - redirect_uri
        - state

    MobileTokenExchangeSuccess:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    LogoutMobileSessionSuccess:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    Course:
      type: object
      properties:
        id:
          type: string
        semesterId:
          type: string
        name:
          type: string
        credits:
          type: number
        marks:
          type: number
          nullable: true
        gradeLetter:
          type: string
          nullable: true
      required:
        - id
        - semesterId
        - name
        - credits

    Semester:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        courses:
          type: array
          items:
            $ref: '#/components/schemas/Course'
      required:
        - id
        - name
        - courses

    SemesterListResponse:
      type: object
      properties:
        semesters:
          type: array
          items:
            $ref: '#/components/schemas/Semester'
      required:
        - semesters

    SemesterResponse:
      type: object
      properties:
        semester:
          $ref: '#/components/schemas/Semester'
      required:
        - semester

    CourseResponse:
      type: object
      properties:
        course:
          $ref: '#/components/schemas/Course'
      required:
        - course

    CreateSemesterBody:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    UpdateSemesterBody:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    CreateCourseBody:
      type: object
      properties:
        name:
          type: string
        credits:
          type: number
        marks:
          type: number
          nullable: true
        gradeLetter:
          type: string
          nullable: true
      required:
        - name
        - credits

    UpdateCourseBody:
      type: object
      properties:
        name:
          type: string
        credits:
          type: number
        marks:
          type: number
          nullable: true
        gradeLetter:
          type: string
          nullable: true
      required:
        - name
        - credits

    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    ErrorEnvelope:
      type: object
      properties:
        error:
          type: string
      required:
        - error
