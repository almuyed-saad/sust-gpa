packages:
  "zustand": "For elegant local storage state management without backend"
  "uuid": "For generating unique IDs for semesters and courses"
  "@types/uuid": "Types for uuid"
  "recharts": "For visualizing GPA progression"
  "framer-motion": "For smooth layout animations when adding/removing courses"
