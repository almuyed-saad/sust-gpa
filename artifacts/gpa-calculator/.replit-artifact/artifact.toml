kind = "web"
previewPath = "/"
title = "GPA & Grade Calculator"
version = "1.0.0"
id = "artifacts/gpa-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22920
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/gpa-calculator run dev"

[services.env]
PORT = "22920"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/gpa-calculator", "run", "build"]
publicDir = "artifacts/gpa-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
